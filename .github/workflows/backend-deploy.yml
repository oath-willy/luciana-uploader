name: Deploy backend to Azure Container App

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and Deploy to Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: luciana-backend
          resourceGroup: luciana_resource_group
          imageToBuild: lucianaacr01.azurecr.io/luciana-backend:latest
          acrName: lucianaacr01
          dockerfilePath: ./backend/Dockerfile
          targetPort: 8000
          appSourcePath: ./backend
