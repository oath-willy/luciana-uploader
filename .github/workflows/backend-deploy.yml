name: Build and Deploy Backend to Azure Container App

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build image and push to ACR
        run: |
          az acr build \
            --registry lucianaacr01 \
            --image luciana-backend:latest \
            ./backend

      - name: Deploy to Azure Container App
        run: |
          az containerapp update \
            --name luciana-backend \
            --resource-group luciana_resource_group \
            --image lucianaacr01.azurecr.io/luciana-backend:latest
