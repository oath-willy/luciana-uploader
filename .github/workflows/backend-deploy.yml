name: Deploy backend to Azure Container App

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container Apps (build + push + deploy)
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: luciana-backend
          resourceGroup: luciana_resource_group
          appSourcePath: ./backend
          acrName: lucianaacr01
          targetPort: 8000
          useManagedIdentity: true
